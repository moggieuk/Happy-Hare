variable_user_resume_extension  : [[VAR_CLIENT_USER_RESUME_EXTENSION]]		; Executed before the klipper base resume
variable_user_cancel_extension  : [[VAR_CLIENT_USER_CANCEL_EXTENSION]]		; Executed before the klipper base cancel_print



# TOOLHEAD TIP CUTTING --------------------------------------------------------------------
#  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
# ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ    ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó
# ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ          ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
# ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ          ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ
# ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ   ‚Ėą‚Ėą‚ēĎ          ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ
#  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ    ‚ēö‚ēź‚ēĚ          ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ
# Don't need to configure if using tip forming
#   (macros/mmu_cut_tip.cfg)
#
[gcode_macro _MMU_CUT_TIP_VARS]
description: Happy Hare toolhead tip cutting macro configuration variables
gcode: # Leave empty

# Whether the toolhead tip cutting macro will return toolhead to initial position
# after the cut is complete. If using parking logic it is better to disable this
variable_restore_position       : [[VAR_CUT_TIP_RESTORE_POSITION]]		; True = return to initial position, False = don't return

# Distance from the internal nozzle tip to the cutting blade. This dimension
# is based on your toolhead and should not be used for tuning
# Note: If you have a toolhead sensor this variable can be automatically determined!
# Read https://github.com/moggieuk/Happy-Hare/wiki/Blobbing-and-Stringing
variable_blade_pos              : [[VAR_CUT_TIP_BLADE_POS]]		; TUNE ME: Distance in mm from internal nozzle tip

# Distance to retract prior to making the cut, measured from the internal nozzle
# tip. This reduces wasted filament (left behind in extruder) but might cause a
# clog if set too large. This must be less than 'blade_pos'
# Note: the residual filament left in nozzle ('toolhead_ooze_reduction') is
# subtracted from this value so make sure toolhead is calibrated
variable_retract_length         : [[VAR_CUT_TIP_RETRACT_LENGTH]]		; TUNE ME: 5mm less than 'blade_pos' is a good starting point

# Whether to perform a simple tip forming move after the initial retraction
# Enabling this adds gives some additional cooling time of molten filament and
# may help avoid potential clogging on some hotends
variable_simple_tip_forming     : [[VAR_CUT_TIP_SIMPLE_TIP_FORMING]]		; True = Perform simple tip forming, False = skip

# Change to X and Y stepper current during the cut operation. Technically any stepper
# current can be modified by adding the stepper name to the list. Be careful not to
# overload your steppers but generally up to 150% is safe
variable_cut_axis_steppers      : [[VAR_CUT_TIP_CUT_AXIS_STEPPERS]]	; Comma separated list of stepper names to increase current for cutting
variable_cut_stepper_current    : [[VAR_CUT_TIP_CUT_STEPPER_CURRENT]]				; % of stepper current to use for cutting motion (100 to disable)

# This should be the position of the toolhead where the cutter arm just
# lightly touches the depressor pin
variable_cutting_axis           : [[VAR_CUT_TIP_CUTTING_AXIS]]		; 'x' or 'y'. Determines cut direction (axis) during cut motion, used for park distance
variable_pin_loc_xy             : [[VAR_CUT_TIP_PIN_LOC_XY]]	; x,y coordinates of depressor pin

# This distance is added (or subtracted if negative) to "pin_loc_x" or "pin_loc_y" depending on the 'cutting_axis'
# This is used to determine the starting position and to create a small safety distance that aids in generating momentum.
# For example, Filametrix cuts along X axis towards Xmin requiring a positive value, whereas A4T-A4C cuts on Y axis towards
# Ymax requiring a negative number
variable_pin_park_dist          : [[VAR_CUT_TIP_PIN_PARK_DIST]]		; Distance in mm (+ve or -ve) from 'variable_pin_loc_xy'

# Position of the toolhead when the cutter is fully compressed. Should leave a small headroom from the
# extremes of your printer edges (e.g. it should be a bit larger than 0, or whatever Xmin is) to avoid
# banging the toolhead or gantry. Typically x position will match x in pin_loc_xy if cutting in y direction
# or y position will match y in pin_loc_xy if cutting in x direction, but diagonal cuts are possible
variable_pin_loc_compressed_xy  : [[VAR_CUT_TIP_PIN_LOC_COMPRESSED_XY]]	; x,y coordinates of fully depressed location

# Retract length and speed after the cut so that the cutter blade doesn't
# get stuck on return to origin position
variable_rip_length             : [[VAR_CUT_TIP_RIP_LENGTH]]		; Distance in mm to retract to aid lever decompression (>= 0)
variable_rip_speed              : [[VAR_CUT_TIP_RIP_SPEED]]		; Speed mm/s

# Pushback of the remaining tip from the cold end into the hotend. This does
# not have to push back all the way, just sufficient to ensure filament fragment
# stays in hot end and the "nail head" of the cut is pushed back past the
# PTFE/metal junction so it cannot cause clogging problems on future loads.
# Cannot be larger than 'retract_length' - `toolhead_ooze_reduction`
variable_pushback_length        : [[VAR_CUT_TIP_PUSHBACK_LENGTH]]		; TUNE ME: PTFE tube length + 3mm is good starting point
variable_pushback_dwell_time    : [[VAR_CUT_TIP_PUSHBACK_DWELL_TIME]]		; Time in ms to dwell after the pushback

# Speed related settings for tip cutting
# Note that if the cut speed is too fast, the steppers can lose steps.
# Therefore, for a cut:
# - We first make a fast move to accumulate some momentum and get the cut
#   blade to the initial contact with the filament
# - We then make a slow move for the actual cut to happen
variable_travel_speed           : [[VAR_CUT_TIP_TRAVEL_SPEED]]		; Speed mm/s
variable_cut_fast_move_speed    : [[VAR_CUT_TIP_CUT_FAST_MOVE_SPEED]]		; Speed mm/s
variable_cut_slow_move_speed    : [[VAR_CUT_TIP_CUT_SLOW_MOVE_SPEED]]		; Speed mm/s
variable_evacuate_speed         : [[VAR_CUT_TIP_EVACUATE_SPEED]]		; Speed mm/s
variable_cut_dwell_time         : [[VAR_CUT_TIP_CUT_DWELL_TIME]]		; Time in ms to dwell at the cut point
variable_cut_fast_move_fraction : [[VAR_CUT_TIP_CUT_FAST_MOVE_FRACTION]]		; Fraction of the move that uses fast move
variable_extruder_move_speed    : [[VAR_CUT_TIP_EXTRUDER_MOVE_SPEED]]		; Speed mm/s for all extruder movement

# Safety margin for fast vs slow travel. When traveling to the pin location
# we make a safer but longer move if we are closer to the pin than this
# specified margin. Usually setting these to the size of the toolhead
# (plus a small margin) should be good enough
variable_safe_margin_xy         : [[VAR_CUT_TIP_SAFE_MARGIN_XY]]	; Approx toolhead width +5mm, height +5mm)

# If gantry servo option is installed, enable the servo and set up and down
# angle positions
variable_gantry_servo_enabled   : [[VAR_CUT_TIP_GANTRY_SERVO_ENABLED]]		; True = enabled, False = disabled
variable_gantry_servo_down_angle: [[VAR_CUT_TIP_GANTRY_SERVO_DOWN_ANGLE]]		; Angle for when pin is deployed
variable_gantry_servo_up_angle  : [[VAR_CUT_TIP_GANTRY_SERVO_UP_ANGLE]]		; Angle for when pin is retracted



# FORM_TIP --------------------------------------------------------------------------------
# ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó
# ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ    ‚ēö‚ēź‚ēź‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó
# ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚ēĎ       ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ
# ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ       ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ
# ‚Ėą‚Ėą‚ēĎ     ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ       ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ
# ‚ēö‚ēź‚ēĚ      ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ       ‚ēö‚ēź‚ēĚ   ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēĚ
# Don't need to configure if using tip cutting
#   (macros/mmu_form_tip.cfg)
#
[gcode_macro _MMU_FORM_TIP_VARS]
description: Happy Hare tip forming macro configuration variables
gcode: # Leave empty

# Step 1 - Ramming
# Ramming is the initial squeeze of filament prior to cooling moves and is
# described in terms of total volume and progression of squeeze intensity
# printing/standalone. This can be separately controlled when printing or
# standalone
variable_ramming_volume            : [[VAR_FORM_TIP_RAMMING_VOLUME]]		; Volume in mm^3, 0 = disabled (optionally let slicer do it)
variable_ramming_volume_standalone : [[VAR_FORM_TIP_RAMMING_VOLUME_STANDALONE]]		; Volume in mm^3, 0 = disabled

# Optionally set for temperature change (reduction). The wait will occur
# before nozzle separation if 'use_fast_skinnydip: False' else after cooling
# moves. Temperature will be restored after tip creation is complete
variable_toolchange_temp        : [[VAR_FORM_TIP_TOOLCHANGE_TEMP]]		; 0 = don't change temp, else temp to set
variable_toolchange_fan_assist  : [[VAR_FORM_TIP_TOOLCHANGE_FAN_ASSIST]]		; Whether to use part cooling fan for quicker temp change
variable_toolchange_fan_name    : [[VAR_FORM_TIP_TOOLCHANGE_FAN_NAME]]		; Define the part fan name if not default [fan] e.g "fan_generic fan0"
variable_toolchange_fan_speed   : [[VAR_FORM_TIP_TOOLCHANGE_FAN_SPEED]]		; Fan speed % if using fan_assist enabled

# Step 2 - Nozzle Separation
# The filament is then quickly separated from the meltzone by a fast movement
# before then slowing to travel the remaining distance to cooling tube. The
# initial fast movement should be as fast as extruder can comfortably perform.
# A good starting point# for slower move is unloading_speed_start/cooling_moves.
# Too fast a slower movement can lead to excessively long tips or hairs
variable_unloading_speed_start  : [[VAR_FORM_TIP_UNLOADING_SPEED_START]]		; Speed in mm/s for initial fast movement
variable_unloading_speed        : [[VAR_FORM_TIP_UNLOADING_SPEED]]		; Speed in mm/s for slow move to cooling zone

# Step 3 - Cooling Moves
# The cooling move allows the filament to harden while constantly moving back
# and forth in the cooling tube portion of the extruder to prevent a bulbous
# tip forming. The cooling tube position is measured from the internal nozzle
# to just past the top of the heater block (often it is beneficial to add a
# couple of mm to ensure the tip is in the cooling section. The cooling tube
# length is then the distance from here to top of heatsink (this is the length
# length of the cooling moves). The final cooling move is a fast movement to
# break the string formed.
variable_cooling_tube_position  : [[VAR_FORM_TIP_COOLING_TUBE_POSITION]]		; Start of cooling tube. DragonST:35, DragonHF:30, Mosquito:30, Revo:35, RapidoHF:27
variable_cooling_tube_length    : [[VAR_FORM_TIP_COOLING_TUBE_LENGTH]]		; Movement length. DragonST:15, DragonHF:10, Mosquito:20, Revo:10, RapidoHF:10
variable_initial_cooling_speed  : [[VAR_FORM_TIP_INITIAL_COOLING_SPEED]]		; Initial slow movement (mm/s) to solidify tip and cool string if formed
variable_final_cooling_speed    : [[VAR_FORM_TIP_FINAL_COOLING_SPEED]]		; Fast movement (mm/s) Too fast: tip deformation on eject, Too Slow: long string/no separation
variable_cooling_moves          : [[VAR_FORM_TIP_COOLING_MOVES]]		; Number of back and forth cooling moves to make (2-4 is a good start)

# Step 4 - Skinnydip
# Skinnydip is an advanced final move that may have benefit with some
# material like PLA to burn off persistent very fine hairs. To work the
# depth of insertion is critical (start with it disabled and tune last)
# For reference the internal nozzle would be at a distance of
# cooling_tube_position + cooling_tube_length, the top of the heater
# block would be cooling_tube_length away.
variable_use_skinnydip          : [[VAR_FORM_TIP_USE_SKINNYDIP]]		; True = enable skinnydip, False = skinnydip move disabled
variable_skinnydip_distance     : [[VAR_FORM_TIP_SKINNYDIP_DISTANCE]]		; Distance to reinsert filament into hotend starting from end of cooling tube
variable_dip_insertion_speed    : [[VAR_FORM_TIP_DIP_INSERTION_SPEED]]		; Medium/Slow insertion speed mm/s - Just long enough to melt the fine hairs, too slow will pull up molten filament
variable_dip_extraction_speed   : [[VAR_FORM_TIP_DIP_EXTRACTION_SPEED]]		; Speed mm/s - Around 2x Insertion speed to prevents forming new hairs
variable_melt_zone_pause        : [[VAR_FORM_TIP_MELT_ZONE_PAUSE]]		; Pause if melt zone in ms. Default 0
variable_cooling_zone_pause     : [[VAR_FORM_TIP_COOLING_ZONE_PAUSE]]		; Pause if cooling zone after dip in ms. Default 0
variable_use_fast_skinnydip     : [[VAR_FORM_TIP_USE_FAST_SKINNYDIP]]		; False = Skip the toolhead temp change wait during skinnydip move

# Step 5 - Parking
# Park filament ready to eject
variable_parking_distance       : [[VAR_FORM_TIP_PARKING_DISTANCE]]		; Position mm to park the filament at end of tip forming, 0 = leave where filament ends up after tip forming
variable_extruder_eject_speed   : [[VAR_FORM_TIP_EXTRUDER_EJECT_SPEED]]		; Speed mm/s used for parking_distance (and final_eject when testing)



